version: '3.9'

services:
  db:
    image: postgres:17-alpine3.23
    container_name: postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: test_task
    ports: [ 5432:5432 ]
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d test_task" ]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_NAME=room-booking-service
      - APP_VERSION=1.0.0
      - HTTP_PORT=8080
      - LOG_LEVEL=debug
      - PG_POOL_MAX=10
      - HTTP_JWT_SECRET=dev-integration-secret
      - SWAGGER_ENABLED=false
      - PG_URL=postgres://user:1234@db:5432/test_task?sslmode=disable
    networks:
      - app_network
  integration-test:
    container_name: integration_test
    platform: linux/amd64
    pid: "host"
    build:
      context: .
      dockerfile: integration_test/Dockerfile
    depends_on:
      - app
    networks:
      app_network:
        aliases:
          - test.lvh.me

networks:
  app_network:
    external: false
