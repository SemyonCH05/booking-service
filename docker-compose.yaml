services:
  db:
    image: postgres:17-alpine3.23
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1234}
      POSTGRES_DB: ${POSTGRES_DB:-test_task}
    ports: [ 5432:5432 ]
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d test_task" ]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - APP_NAME=${APP_NAME:-room-booking-service}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - HTTP_PORT=${HTTP_PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      - PG_POOL_MAX=${PG_POOL_MAX:-10}
      - HTTP_JWT_SECRET=${HTTP_JWT_SECRET:-dev-integration-secret}
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-false}
      - PG_URL=${PG_URL:-postgres://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-1234}@db:5432/${POSTGRES_DB:-test_task}?sslmode=disable}
    networks:
      - app_network

networks:
  app_network:
    external: false
